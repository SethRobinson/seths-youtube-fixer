<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Seth's YouTube Fixer — action log</title>
    <style>
      body {
        font: 14px 'Roboto', Arial, sans-serif;
        max-width: 680px;
        margin: 28px auto;
        padding: 0 18px 48px;
        background: #0f0f0f;
        color: #f1f1f1;
      }
      h1 { font-size: 19px; }
      #status { min-height: 18px; color: #ffb300; font-size: 13px; margin: 6px 0; }
      .empty { opacity: 0.7; padding: 24px 2px; }
      .row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.07); }
      .meta { flex: 1; min-width: 0; }
      .rtitle { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .rsub { font-size: 11px; opacity: 0.65; margin-top: 2px; }
      .undone .rtitle { text-decoration: line-through; opacity: 0.6; }
      .src { text-transform: uppercase; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
      .src-app { background: #3ea6ff; color: #0f0f0f; }
      .src-native { background: #ffb300; color: #0f0f0f; }
      .rowbtn {
        flex: 0 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: transparent;
        color: inherit;
        border-radius: 16px;
        padding: 5px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .rowbtn:hover { background: rgba(255, 255, 255, 0.1); }
    </style>
  </head>
  <body>
    <h1>Action log</h1>
    <div id="status"></div>
    <div id="root"></div>
    <script src="log.js"></script>
  </body>
</html>
